name: Build and Deploy

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  deploy:
    # Note: This workflow deploys to IIS and SQL Server.
    # It must run on a self-hosted runner installed on the target Windows deployment server.
    runs-on: self-hosted

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '9.0'

      - name: Build and Publish Solution
        shell: cmd
        run: dotnet publish ProductivityTools.Journal.Api.sln -c Release

      - name: Delete old database migration directory
        shell: powershell
        run: |
          if (Test-Path "C:\Bin\DbMigration\PTJournal.Api") {
              Remove-Item "C:\Bin\DbMigration\PTJournal.Api" -Recurse -Force
          }

      - name: Copy database migration files
        shell: powershell
        run: |
          New-Item -ItemType Directory -Force -Path "C:\Bin\DbMigration\PTJournal.Api"
          Copy-Item -Path "src\Server\ProductivityTools.Journal.DbUp\bin\Release\net9.0\publish\*" -Destination "C:\Bin\DbMigration\PTJournal.Api\" -Recurse -Force

      - name: Run database migrations
        shell: cmd
        run: C:\Bin\DbMigration\PTJournal.Api\ProductivityTools.Journal.DbUp.exe

      - name: Ensure IIS Site and AppPool Exist
        shell: powershell
        run: |
          function CheckIfExist($Name) {
              cd $env:SystemRoot\system32\inetsrv
              $exists = (.\appcmd.exe list sites /name:$Name) -ne $null
              Write-Host "Site exists: $exists"
              return $exists
          }

          function Create($Name, $HttpBinding, $PhysicalPath) {
              $exists = CheckIfExist $Name
              if ($exists) {
                  Write-Host "Web page already existing"
              }
              else {
                  Write-Host "Creating app pool"
                  .\appcmd.exe add apppool /name:$Name /managedRuntimeVersion:"v4.0" /managedPipelineMode:"Integrated"
                  Write-Host "Creating webpage"
                  .\appcmd.exe add site /name:$Name /bindings:http://$HttpBinding /physicalpath:$PhysicalPath
                  Write-Host "Assign app pool to the website"
                  .\appcmd.exe set app "$Name/" /applicationPool:"$Name"
              }
          }

          Create "PTJournal" "*:8008" "C:\Bin\IIS\PTJournal"

      - name: Stop IIS Website
        shell: cmd
        run: %windir%\system32\inetsrv\appcmd stop site /site.name:PTJournal

      - name: Delete old IIS directory
        shell: powershell
        run: |
          if (Test-Path "C:\Bin\IIS\PTJournal") {
              while ($true) {
                  try {
                      Remove-Item "C:\Bin\IIS\PTJournal" -Recurse -Force -ErrorAction Stop
                      break
                  }
                  catch {
                      Write-Output "Removing failed, waiting to retry..."
                      Start-Sleep -Seconds 1
                  }
              }
          }

      - name: Copy web page to IIS Bin directory
        shell: powershell
        run: |
          New-Item -ItemType Directory -Force -Path "C:\Bin\IIS\PTJournal"
          Copy-Item -Path "src\Server\ProductivityTools.Journal.WebApi\bin\Release\net9.0\publish\*" -Destination "C:\Bin\IIS\PTJournal\" -Recurse -Force

      - name: Start IIS Website
        shell: cmd
        run: %windir%\system32\inetsrv\appcmd start site /site.name:PTJournal

      - name: Create SQL Login
        shell: cmd
        run: sqlcmd -S ".\SQL2022" -q "IF NOT EXISTS (SELECT * FROM sys.server_principals WHERE name = 'IIS APPPOOL\PTJournal') CREATE LOGIN [IIS APPPOOL\PTJournal] FROM WINDOWS WITH DEFAULT_DATABASE=[PTJournal];"

      - name: Create SQL User
        shell: cmd
        run: sqlcmd -S ".\SQL2022" -q "USE PTJournal; IF NOT EXISTS (SELECT * FROM sys.database_principals WHERE name = 'IIS APPPOOL\PTJournal') CREATE USER [IIS APPPOOL\PTJournal] FOR LOGIN [IIS APPPOOL\PTJournal];"

      - name: Grant db_owner to IIS AppPool
        shell: cmd
        run: sqlcmd -S ".\SQL2022" -q "USE PTJournal; ALTER ROLE [db_owner] ADD MEMBER [IIS APPPOOL\PTJournal];"

